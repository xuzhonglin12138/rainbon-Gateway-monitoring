name: Build and Push Plugin Image

on:
  workflow_dispatch:
    inputs:
      plugin_id:
        description: 'Plugin ID (e.g. rainbond-enterprise-logs)'
        required: true
        type: string
      main_js_url:
        description: 'URL to download main.js from'
        required: true
        type: string
      image_tag:
        description: 'Image tag'
        required: false
        default: 'v1.0'
        type: string

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAMESPACE: rbd-plugins

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download main.js
        run: curl -fSL "${{ inputs.main_js_url }}" -o cmd/plugin/static/main.js

      - name: Set PluginID
        run: sed -i 's/PluginID = ".*"/PluginID = "${{ inputs.plugin_id }}"/' cmd/plugin/config.go

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ inputs.plugin_id }}:${{ inputs.image_tag }}
