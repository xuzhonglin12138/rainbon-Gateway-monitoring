# RBDPlugin CRD resource for this plugin.
# Apply this after the plugin is deployed.
#
# metadata.name is the pluginName used by:
# /console/regions/{region}/backend/plugins/{pluginName}/...
# Adjust the namespace and service name to match your deployment.
apiVersion: rainbond.io/v1alpha1
kind: RBDPlugin
metadata:
  name: rainbond-gateway-monitoring
spec:
  display_name: "Rainbond Gateway Monitoring"
  description: "Rainbond APISIX gateway and internal route monitoring plugin"
  plugin_type: JSInject
  version: "1.0.0"
  # rbd-api PluginStaticProxy fetches /static/main.js from this service.
  frontend_service: "http://rainbond-gateway-monitoring.rbd-system.svc:8080"
  # rbd-api PluginBackendProxy forwards /api/v1/* to this service.
  backend_service: "http://rainbond-gateway-monitoring.rbd-system.svc:8080"
---
# RBAC: allow the plugin pod to read the license ConfigMap, manage
# plugin-owned APISIX GlobalRules, and scan Rainbond-owned APISIX
# Routes without mutating user route specs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rainbond-gateway-monitoring
  namespace: rbd-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rainbond-gateway-monitoring-license
  namespace: rbd-system
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["rbd-license-info"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rainbond-gateway-monitoring-license
  namespace: rbd-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rainbond-gateway-monitoring-license
subjects:
- kind: ServiceAccount
  name: rainbond-gateway-monitoring
  namespace: rbd-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rainbond-gateway-monitoring-apisix
rules:
- apiGroups: ["apisix.apache.org"]
  resources: ["apisixroutes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apisix.apache.org"]
  resources: ["apisixglobalrules"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rainbond-gateway-monitoring-apisix
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rainbond-gateway-monitoring-apisix
subjects:
- kind: ServiceAccount
  name: rainbond-gateway-monitoring
  namespace: rbd-system
